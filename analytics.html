<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Analytics</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f4f6fb;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #111827;
    color: #fff;
    padding: 20px;
    position: fixed;
    width: 240px;
}

.sidebar h4 {
    font-weight: bold;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1f2937;
    color: #fff;
}

/* Content */
.main-content {
    margin-left: 260px;
    padding: 30px;
}

/* Cards */
.stat-card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.stat-icon {
    font-size: 28px;
    padding: 15px;
    border-radius: 50%;
    color: #fff;
}

.bg-blue { background: #6366f1; }
.bg-green { background: #22c55e; }
.bg-yellow { background: #f59e0b; }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="index.html" class="active"><h4 class="mb-4">🎙 Podcast</h4></a>

    <a href="admin-dashboard.html">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a href="upload-episode.html">
        <i class="bi bi-cloud-upload me-2"></i> Upload Episode
    </a>

    <a href="episodes.html">
        <i class="bi bi-mic me-2"></i> Episodes
    </a>

    <a href="analytics.html" class="active">
        <i class="bi bi-bar-chart me-2"></i> Analytics
    </a>

    <a href="logout.html">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
    </a>
</div>

<!-- Main Content -->
<div class="main-content">

    <h2 class="fw-bold mb-4">📊 Analytics</h2>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card d-flex justify-content-between align-items-center">
                <div>
                    <h6>Total Plays</h6>
                    <h3>120,450</h3>
                </div>
                <div class="stat-icon bg-blue">
                    <i class="bi bi-play-fill"></i>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card d-flex justify-content-between align-items-center">
                <div>
                    <h6>Listeners</h6>
                    <h3>48,320</h3>
                </div>
                <div class="stat-icon bg-green">
                    <i class="bi bi-people-fill"></i>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card d-flex justify-content-between align-items-center">
                <div>
                    <h6>Episodes</h6>
                    <h3>36</h3>
                </div>
                <div class="stat-icon bg-yellow">
                    <i class="bi bi-mic-fill"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="stat-card">
        <h5 class="mb-3">Weekly Plays</h5>
        <canvas id="playChart"></canvas>
    </div>

</div>

<script>
const ctx = document.getElementById('playChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Plays',
            data: [1200, 1800, 2500, 2100, 2800, 3500, 4200],
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99,102,241,0.2)',
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>

</body>
</html>
