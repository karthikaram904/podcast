<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f6fb;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #111827;
    color: #fff;
    padding: 20px;
    position: fixed;
    width: 240px;
}

.sidebar h4 {
    font-weight: bold;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1f2937;
    color: #fff;
}

/* Content */
.main-content {
    margin-left: 260px;
    padding: 40px;
}

/* Logout Card */
.logout-card {
    max-width: 450px;
    background: #fff;
    border-radius: 18px;
    padding: 35px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.logout-icon {
    font-size: 50px;
    color: #ef4444;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="index.html" class="active"><h4 class="mb-4">🎙 Podcast</h4></a>

    <a href="admin-dashboard.html">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a href="upload-episode.html">
        <i class="bi bi-cloud-upload me-2"></i> Upload Episode
    </a>

    <a href="episodes.html">
        <i class="bi bi-mic me-2"></i> Episodes
    </a>

    <a href="analytics.html">
        <i class="bi bi-bar-chart me-2"></i> Analytics
    </a>

    <a href="logout.html" class="active">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
    </a>
</div>

<!-- Main Content -->
<div class="main-content d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="logout-card text-center">

        <div class="logout-icon mb-3">
            <i class="bi bi-box-arrow-right"></i>
        </div>

        <h3 class="fw-bold mb-2">Logout</h3>
        <p class="text-muted mb-4">
            Are you sure you want to log out from your dashboard?
        </p>

        <div class="d-flex justify-content-center gap-3">
            <a href="login.html" class="btn btn-danger px-4">
                Yes, Logout
            </a>
            <a href="admin-dashboard.html" class="btn btn-outline-secondary px-4">
                Cancel
            </a>
        </div>

    </div>
</div>

</body>
</html>
