<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Episodes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }
        /* Sidebar */
.sidebar {
    height: 100vh;
    background: #111827;
    color: #fff;
    padding: 20px;
    position: fixed;
    width: 240px;
}

.sidebar h4 {
    font-weight: bold;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1f2937;
    color: #fff;
}
        .main {
            margin-left: 270px;
            padding: 30px;
        }
        .episode-card {
            background: #fff;
            border-radius: 14px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .episode-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
        }
        .badge-published {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-draft {
            background: #fde68a;
            color: #92400e;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <a href="index.html" class="active"><h4 class="mb-4">🎙 Podcast</h4></a>

    <a href="admin-dashboard.html">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a href="upload-episode.html">
        <i class="bi bi-cloud-upload me-2"></i> Upload Episode
    </a>

    <a href="episodes.html" class="active">
        <i class="bi bi-mic me-2"></i> Episodes
    </a>

    <a href="analytics.html">
        <i class="bi bi-bar-chart me-2"></i> Analytics
    </a>

    <a href="logout.html" class="active">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
    </a>
</div>

<!-- Main -->
<div class="main">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Episodes</h3>
        <a href="upload-episode.html" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> New Episode
        </a>
    </div>

    <!-- Episode Item -->
    <div class="episode-card">
        <img src="images/podcast/27670664_7369753.jpg" class="episode-thumb" alt="">
        <div class="flex-grow-1">
            <h6 class="mb-1">Finding Moments of Joy</h6>
            <small class="text-muted">Duration: 45 mins</small><br>
            <span class="badge badge-published mt-1">Published</span>
        </div>

        <div class="text-center me-3">
            <i class="bi bi-headphones"></i>
            <div>12.4k</div>
        </div>

        <div class="text-center me-3">
            <i class="bi bi-heart"></i>
            <div>2.1k</div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>

    <!-- Episode Item -->
    <div class="episode-card">
        <img src="images/podcast/11683425_4790593.jpg" class="episode-thumb" alt="">
        <div class="flex-grow-1">
            <h6 class="mb-1">Easy Strategies To Succeed</h6>
            <small class="text-muted">Duration: 30 mins</small><br>
            <span class="badge badge-draft mt-1">Draft</span>
        </div>

        <div class="text-center me-3">
            <i class="bi bi-headphones"></i>
            <div>—</div>
        </div>

        <div class="text-center me-3">
            <i class="bi bi-heart"></i>
            <div>—</div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>

</div>

</body>
</html>
